<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyboard key inspector</title>
    <script src="index.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main" class="container">
      <div class="centered">
        <h1>Keyboard key inspector</h1>
        <h2>Type any key</h2>
        <div id="line-key">
          <label>Key:&nbsp;</label>
          <span id="info-key"></span>
        </div>
        <div id="line-keyCode">
          <label>Key Code:&nbsp;</label>
          <span id="info-keyCode"></span>
        </div>
        <div id="line-altKey">
          <label>Alt Key:&nbsp;</label>
          <span id="info-altKey"></span>
        </div>
        <div id="line-code">
          <label>Code:&nbsp;</label>
          <span id="info-code"></span>
        </div>
        <div id="line-composed">
          <label>Composed:&nbsp;</label>
          <span id="info-composed"></span>
        </div>
        <div id="line-ctrlKey">
          <label>CtrlKey:&nbsp;</label>
          <span id="info-ctrlKey"></span>
        </div>
        <div id="line-metaKey">
          <label>Meta Key:&nbsp;</label>
          <span id="info-metaKey"></span>
        </div>
        <div id="line-shiftKey">
          <label>Shift Key:&nbsp;</label>
          <span id="info-shiftKey"></span>
        </div>
      </div>
    </div>
  </body>
</html>
